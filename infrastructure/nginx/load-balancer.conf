# Beleqet Load Balancer — Nginx upstream configuration
# Strategies demonstrated:
#   - round_robin  (default upstream distribution)
#   - least_conn   (least_conn directive below)
#   - ip_hash      (ip_hash directive — enables sticky sessions by client IP)
#
# Health checks: max_fails + fail_timeout act as passive health probes.
# Active probes can target /api/v1/load-balancer/ping on each upstream.

upstream beleqet_backend {
    # Uncomment ONE strategy at a time:

    # Strategy: Round Robin (default — requests rotate sequentially)
    server backend-1:4000 max_fails=3 fail_timeout=30s;
    server backend-2:4000 max_fails=3 fail_timeout=30s;

    # Strategy: Least Connections — uncomment the next line and comment ip_hash if used
    # least_conn;

    # Strategy: IP Hash — sticky sessions by client IP (session affinity)
    # ip_hash;
}

server {
    listen 80;
    server_name localhost;

    # Sticky sessions via cookie (alternative to ip_hash)
    # Requires nginx-sticky-module or nginx-plus; documented for production deployments.
    # sticky cookie beleqet_session expires=1h domain=localhost path=/;

    location / {
        proxy_pass http://beleqet_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Multi-currency & region routing headers (global scaling)
        proxy_set_header X-Currency $http_x_currency;
        proxy_set_header X-Region $http_x_region;
        proxy_set_header X-Session-Id $cookie_beleqet_session;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location /api/v1/load-balancer/ping {
        proxy_pass http://beleqet_backend;
        access_log off;
    }
}
