name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: beleqet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Existing project dependencies
      - run: npm ci

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/beleqet_test
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          REDIS_PASSWORD=
          JWT_ACCESS_SECRET=ci_test_jwt_secret
          JWT_ACCESS_EXPIRES=15m
          JWT_REFRESH_EXPIRES=30d
          NODE_ENV=test
          PORT=4000
          FRONTEND_URL=http://localhost:3000
          OPENAI_API_KEY=sk-test-dummy-key-for-ci
          EOF

      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run build
      - run: npm test


      # ===============================
      # Salary Estimator Backend
      # ===============================

      - name: Install salary estimator backend dependencies
        working-directory: Salary_estimater/backend
        run: npm ci

      - name: Build salary estimator backend
        working-directory: Salary_estimater/backend
        run: npm run build



      - name: Install salary estimator frontend dependencies
        working-directory: Salary_estimater/frontend
        run: npm ci

      - name: Build salary estimator frontend
        working-directory: Salary_estimater/frontend
        run: npm run build


  playwright-e2e:
    needs: [unit-tests]
    continue-on-error: true
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: beleqet_test
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/beleqet_test
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          NODE_ENV=test
          PORT=4000
          EOF

      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run build

      - name: Start backend in background
        run: |
          node dist/main &
          timeout 45 sh -c 'until nc -z 127.0.0.1 4000; do sleep 1; done'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test --config frontend/playwright.config.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7