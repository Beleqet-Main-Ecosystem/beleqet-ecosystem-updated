version: '3.8'

# Overlay compose file — run with:
#   docker compose -f docker-compose.yml -f docker-compose.load-balancer.yml up

services:
  # Standalone backend (port 4000) is not used in LB mode; use nginx on :8080 instead.
  backend:
    profiles:
      - standalone

  db:
    networks:
      - default
      - beleqet-net

  redis:
    networks:
      - default
      - beleqet-net

  backend-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beleqet-backend-1
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_URL=postgresql://beleqet_user:your_password@db:5432/beleqet_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=docker_default_secret_please_change_in_production
      - JWT_ACCESS_EXPIRES=15m
      - JWT_REFRESH_EXPIRES=30d
      - BULL_BOARD_USERNAME=admin
      - BULL_BOARD_PASSWORD=admin
      - OPENAI_API_KEY=dummy_key_for_testing
      - LOAD_BALANCER_STRATEGY=round_robin
      - LOAD_BALANCER_STICKY_SESSIONS=true
      - LOAD_BALANCER_BACKENDS=backend-1=http://backend-1:4000:ET:ETB,USD;backend-2=http://backend-2:4000:ET:ETB,USD
    depends_on:
      - db
      - redis
    networks:
      - beleqet-net

  backend-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beleqet-backend-2
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_URL=postgresql://beleqet_user:your_password@db:5432/beleqet_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=docker_default_secret_please_change_in_production
      - JWT_ACCESS_EXPIRES=15m
      - JWT_REFRESH_EXPIRES=30d
      - BULL_BOARD_USERNAME=admin
      - BULL_BOARD_PASSWORD=admin
      - OPENAI_API_KEY=dummy_key_for_testing
      - LOAD_BALANCER_STRATEGY=round_robin
      - LOAD_BALANCER_STICKY_SESSIONS=true
      - LOAD_BALANCER_BACKENDS=backend-1=http://backend-1:4000:ET:ETB,USD;backend-2=http://backend-2:4000:ET:ETB,USD
    depends_on:
      - db
      - redis
    networks:
      - beleqet-net

  nginx-lb:
    image: nginx:1.25-alpine
    container_name: beleqet-nginx-lb
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./infrastructure/nginx/load-balancer.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-1
      - backend-2
    networks:
      - beleqet-net

networks:
  beleqet-net:
    driver: bridge
